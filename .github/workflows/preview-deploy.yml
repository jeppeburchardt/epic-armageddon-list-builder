name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Surge.sh
        id: deploy
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          SURGE_DOMAIN="${{ vars.SURGE_DOMAIN }}"
          
          # Extract the base domain from SURGE_DOMAIN (remove protocol if present)
          BASE_DOMAIN=$(echo "$SURGE_DOMAIN" | sed 's|https\?://||')
          
          # Create PR-specific subdomain
          PR_DOMAIN="pr-${PR_NUMBER}-${BASE_DOMAIN}"
          
          echo "Deploying to: ${PR_DOMAIN}"
          echo "pr_domain=${PR_DOMAIN}" >> $GITHUB_OUTPUT
          
          # Deploy to Surge
          npx surge dist "$PR_DOMAIN" --token ${{ secrets.SURGE_TOKEN }}

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const prDomain = '${{ steps.deploy.outputs.pr_domain }}';
            const previewUrl = `https://${prDomain}`;
            
            const comment = `## 🚀 Preview Deployed!
            
            Your preview environment is ready:
            
            **Preview URL:** ${previewUrl}
            
            This preview will be automatically removed when the PR is closed.`;
            
            // Check if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🚀 Preview Deployed!')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
